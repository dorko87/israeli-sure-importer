services:
  israeli-sure-importer:
    build: .
    image: israeli-sure-importer:latest
    container_name: israeli-sure-importer

    # Hardened: run as non-root
    user: "1000:1000"

    # Hardened: read-only root filesystem
    read_only: true

    # Writable scratch space for Chromium temp files
    tmpfs:
      - /tmp:size=64m,uid=1000,gid=1000,mode=1700

    # Security options
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # No cap_add needed: Chromium runs with --no-sandbox + --disable-setuid-sandbox
    # (configured in scraper.ts) which eliminates the SYS_ADMIN requirement.
    # The Docker container itself is the isolation boundary.

    # No inbound ports — this container is outbound-only
    # NEVER add a ports: entry here

    environment:
      TZ: Asia/Jerusalem
      NODE_ENV: production

      # Logging: "info" for normal use, "debug" for verbose troubleshooting
      # Debug mode also enables israeli-bank-scrapers verbose output
      LOG_LEVEL: info

      # Cron schedule (Asia/Jerusalem timezone)
      # Examples:
      #   "0 8 * * *"   — every day at 08:00
      #   "0 */6 * * *" — every 6 hours
      # Remove SCHEDULE entirely to run once and exit (good for testing)
      SCHEDULE: "0 8 * * *"

      # Puppeteer uses the system Chromium installed in the image
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"

      # Scraper timeout in minutes — also controls puppeteer protocolTimeout
      # Initial run fetches DAYS_BACK days so needs more time; subsequent runs are faster
      TIMEOUT_MINUTES: "20"

      # Set to "false" to send imports to Sure's review queue instead of auto-publishing
      PUBLISH: "true"

      # Set to "true" to scrape without uploading — useful for verifying scraper works
      # DRY_RUN: "false"

      # How many days back to fetch on the very first run (ignored after first sync)
      DAYS_BACK: "30"

    volumes:
      # Config file (read-only)
      - /mnt/user/appdata/sure/israeli-sure-importer/config.json:/app/config.json:ro
      # Secrets directory (read-only, individual credential files)
      - /mnt/user/appdata/sure/israeli-sure-importer/secrets:/run/secrets:ro
      # Persistent cache — stores last-sync timestamps so each run only fetches new transactions
      # Run once: mkdir -p /mnt/user/appdata/sure/israeli-sure-importer/cache && chown -R 1000:1000 /mnt/user/appdata/sure/israeli-sure-importer/cache
      - /mnt/user/appdata/sure/israeli-sure-importer/cache:/app/cache

    # Chromium requires a shared memory segment
    shm_size: "256mb"

    restart: unless-stopped

    networks:
      - sure_net

networks:
  sure_net:
    # Replace with the external Sure network name if Sure runs in a separate stack:
    #   external: true
    #   name: sure_default
    driver: bridge
